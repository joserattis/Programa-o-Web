<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Interativo</title>
    <!-- Ligando o arquivo CSS -->
    <link rel="stylesheet" href="CSS2.css">
</head>
<body>

    <form id="meuFormulario">
        <h2>Cadastro do Sistema</h2>

        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" placeholder="Digite seu nome"><br>

            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" placeholder="Sua idade"><br>
        </fieldset>

        <input type="submit" value="Validar e Enviar">
    </form>

    <!-- Ligando o arquivo JavaScript sempre no final do body -->
    <script src="SCRIPT.js"></script>
</body>
</html>
