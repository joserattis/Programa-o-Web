<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação de Conta Poupança</title>
    <link rel="stylesheet" href="CSS3.css">
</head>
<body>

    <div class="container">
        <h2>Simulação de Poupança</h2>
        
        <div class="descricao">
            <p><strong>Regras do Exercício:</strong></p>
            <ul>
                <li><strong>1º mês:</strong> depósito inicial de R$ 500,00</li>
                <li><strong>2º mês:</strong> depósito adicional de R$ 200,00</li>
                <li><strong>3º mês:</strong> saque de R$ 50,00</li>
                <li><strong>Juros:</strong> 1% ao mês (aplicado sempre ao final)</li>
            </ul>
        </div>

        <button id="btnCalcular">Calcular Evolução do Saldo</button>

        <!-- Esta lista receberá os resultados gerados pelo JavaScript -->
        <ul id="listaResultados"></ul>
    </div>

    <script src="SCRIPT2.js"></script>
</body>
</html>
